<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Product Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f4f6f8;
            color: #333;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: #1f2937;
            color: #fff;
        }

        nav .nav-brand {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
        }

        nav .nav-links a {
            margin-left: 1.5rem;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease-in-out;
        }

        nav .nav-links a:hover {
            color: #60a5fa;
        }

        .cart-count {
            background-color: #ef4444;
            color: #fff;
            padding: 0 6px;
            border-radius: 50%;
            font-size: 0.8rem;
            margin-left: 4px;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 4rem 2rem;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            color: #fff;
            border-radius: 0 0 20px 20px;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 0.8rem;
        }

        .hero p {
            font-size: 1.1rem;
            color: #e0f2fe;
        }

        /* Alert */
        .alert {
            max-width: 800px;
            margin: 0 auto 2rem auto;
            padding: 1rem 1.5rem;
            background-color: #fde68a;
            color: #92400e;
            border-radius: 8px;
            display: none;
            text-align: center;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto 4rem auto;
            padding: 0 1rem;
        }

        .product-card {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease-in-out;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .product-info {
            padding: 1rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-info h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: #1f2937;
        }

        .product-info p {
            font-size: 0.95rem;
            margin-bottom: 0.8rem;
            color: #6b7280;
        }

        .product-info .price {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #111827;
        }

        .product-info button {
            padding: 0.6rem;
            background-color: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out;
        }

        .product-info button:hover {
            background-color: #2563eb;
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html" class="nav-brand">Shop</a>
        <div class="nav-links">
            <a href="index.html">Products</a>
            <a href="cart.html" class="cart-icon">Cart <span id="cart-count" class="cart-count">0</span></a>
            <a href="admin.html" id="admin-link">Admin</a>
            <a href="login.html" id="login-link">Login</a>
            <a href="javascript:void(0)" id="logout-link" style="display:none" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Discover Amazing Products</h1>
        <p>Top quality items at unbeatable prices, delivered to your doorstep.</p>
    </div>

    <div id="alert-box" class="alert"></div>

    <div id="products-grid" class="products-grid">
        <p>Loading products...</p>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            updateCart();
            checkAuth();
        });

        function logout() {
            localStorage.removeItem('authToken');
            checkAuth();
            showAlert('Logged out successfully');
        }

        function showAlert(message) {
            const alertBox = document.getElementById('alert-box');
            alertBox.innerText = message;
            alertBox.style.display = 'block';
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 3000);
        }
    </script>
</body>

</html>
